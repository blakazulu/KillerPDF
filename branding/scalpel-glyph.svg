<svg width="1024" height="1024" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Scalpel app icon — simplified glyph for tiny sizes (<=56px): steel tile + page +
       a single bold diagonal = steel handle into a surgical-red cutting edge. Pairs with
       scalpel-icon.svg (the full mark, used at larger sizes). -->
  <defs>
    <linearGradient id="tileg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#39495F"/>
      <stop offset="1" stop-color="#1A2430"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="244" height="244" rx="56" fill="url(#tileg)"/>
  <g transform="rotate(-6 128 128)">
    <rect x="74" y="56" width="108" height="146" rx="13" fill="#FFFFFF"/>
  </g>
  <path d="M92 180 L142 122" fill="none" stroke="#2C3A4C" stroke-width="20" stroke-linecap="round"/>
  <path d="M139 126 L178 80" fill="none" stroke="#E11D38" stroke-width="20" stroke-linecap="round"/>
</svg>
